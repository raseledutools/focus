name: Build Focus App EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-node: '3.9'

    - name: Install PyInstaller
      run: pip install pyinstaller

    - name: Build EXE
      run: pyinstaller --onefile --admin-rights focus_app.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: FocusApp
        path: dist/focus_app.exe
