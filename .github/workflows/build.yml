name: Build Focus App EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # আপডেট করা হয়েছে v4 এ

    - name: Set up Python
      uses: actions/setup-python@v5 # আপডেট করা হয়েছে v5 এ
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build EXE
      run: pyinstaller --onefile --uac-admin focus_app.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4 # এখানে v3 ছিল, যা v4 করা হয়েছে
      with:
        name: FocusApp-Executable
        path: dist/focus_app.exe
