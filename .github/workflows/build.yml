name: Build RasFocus Elite

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build Professional EXE
      run: |
        pyinstaller --onefile --noconsole --uac-admin --name "RasFocus_Pro_Max" focus_app.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: RasFocus-Elite-Executable
        path: dist/RasFocus_Pro_Max.exe
