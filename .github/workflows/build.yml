name: Build RasFocus Installer

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build Portable EXE
      run: |
        pyinstaller --onefile --noconsole --uac-admin --name "RasFocus_Pro_Max" focus_app.py

    - name: Build Professional Installer (Setup.exe)
      run: |
        "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

    - name: Upload Setup File
      uses: actions/upload-artifact@v4
      with:
        name: RasFocus-Setup-Installer
        path: Output/RasFocus_Setup.exe
